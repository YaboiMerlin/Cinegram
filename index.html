<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Cinegram Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:20px;}
h1{color:#a78bfa;margin-bottom:20px;}
.btn{display:block;width:100%;background:#7c3aed;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;text-align:left;}
.btn:active{background:#6d28d9;}
#log{background:#1a1a1a;border-radius:10px;padding:14px;min-height:60px;font-size:14px;color:#10b981;margin-top:20px;}
</style>
</head>
<body>
<h1>🎮 CINEGRAM GAMES</h1>
<button class="btn" onclick="test('Tic Tac Toe')">⭕ Tic Tac Toe</button>
<button class="btn" onclick="test('Connect 4')">🔴 Connect 4</button>
<button class="btn" onclick="test('Piedra Papel Tijera')">✊ Piedra Papel Tijera</button>
<button class="btn" onclick="test('Adivina el Numero')">🔢 Adivina el Numero</button>
<button class="btn" onclick="test('Trivia')">🎬 Trivia de Peliculas</button>
<div id="log">Toca un juego...</div>
<script>
function test(name) {
  document.getElementById('log').textContent = '✅ Click recibido: ' + name;
}
</script>
</body>
</html>
