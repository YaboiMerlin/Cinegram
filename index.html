<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cinegram 4K</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#e50914;--dark:#0a0a0a;--card:#1a1a1a;--text:#fff;--muted:#888;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
.header{background:linear-gradient(180deg,#000 0%,transparent 100%);padding:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-size:22px;font-weight:900;color:var(--red);letter-spacing:2px;}
.logo span{color:#fff;}
.logo small{font-size:10px;color:var(--muted);display:block;letter-spacing:1px;}
.search-wrap{display:flex;gap:8px;}
.search-wrap input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;outline:none;}
.search-wrap input:focus{border-color:var(--red);}
.search-wrap button{background:var(--red);border:none;border-radius:10px;padding:11px 14px;color:#fff;font-size:16px;cursor:pointer;}
.stats{display:flex;gap:0;background:#111;border-bottom:1px solid #1a1a1a;}
.stat{flex:1;text-align:center;padding:10px 0;border-right:1px solid #1a1a1a;}
.stat:last-child{border-right:none;}
.stat-num{font-size:16px;font-weight:800;color:var(--red);}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.cats{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;scrollbar-width:none;border-bottom:1px solid #111;}
.cats::-webkit-scrollbar{display:none;}
.cat{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:7px 14px;color:#aaa;font-size:12px;white-space:nowrap;cursor:pointer;transition:all .2s;}
.cat.active{background:var(--red);border-color:var(--red);color:#fff;}
.section{padding:16px;}
.sec-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title span{color:var(--red);}
.sec-title .see-all{margin-left:auto;font-size:11px;color:var(--muted);cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s;position:relative;}
.card:active{transform:scale(0.95);}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.card-img-placeholder{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:36px;}
.card-info{padding:7px;}
.card-title{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:9px;color:var(--red);margin-top:2px;}
.card-badge{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;}
.modal{display:none;position:fixed;inset:0;background:#000;z-index:200;overflow-y:auto;}
.modal.open{display:block;}
.modal-backdrop{width:100%;height:250px;object-fit:cover;display:block;}
.modal-backdrop-placeholder{width:100%;height:200px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:80px;}
.modal-gradient{background:linear-gradient(0deg,#000 0%,transparent 100%);height:80px;margin-top:-80px;position:relative;}
.modal-body{padding:0 16px 30px;}
.modal-close{position:fixed;top:16px;right:16px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;z-index:201;backdrop-filter:blur(10px);}
.modal-title{font-size:22px;font-weight:900;margin-bottom:4px;}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.tag{background:#1a1a1a;border-radius:6px;padding:4px 10px;font-size:11px;color:#ccc;}
.tag.red{background:rgba(229,9,20,.2);color:var(--red);}
.modal-overview{font-size:13px;color:#aaa;line-height:1.6;margin:12px 0;}
.parts-title{font-size:14px;font-weight:700;margin:16px 0 10px;}
.parts-grid{display:flex;flex-wrap:wrap;gap:8px;}
.part-btn{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:8px 14px;color:#fff;font-size:12px;cursor:pointer;transition:all .2s;}
.part-btn:active{background:var(--red);border-color:var(--red);}
.btn-primary{width:100%;background:var(--red);border:none;border-radius:12px;padding:15px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;}
.btn-secondary{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:13px;color:#fff;font-size:14px;cursor:pointer;margin-top:8px;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid #333;border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:50px;margin-bottom:12px;}
.hero{position:relative;height:220px;overflow:hidden;margin-bottom:0;}
.hero-img{width:100%;height:100%;object-fit:cover;}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(0deg,#0a0a0a 0%,transparent 60%);}
.hero-info{position:absolute;bottom:16px;left:16px;right:16px;}
.hero-title{font-size:20px;font-weight:900;}
.hero-sub{font-size:12px;color:#aaa;margin-top:4px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">CINE<span>GRAM</span><small>4K CATALOG</small></div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar peliculas y series..." oninput="handleSearch(this.value)">
    <button onclick="clearSearch()">✕</button>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-num" id="sTot">...</div><div class="stat-label">Titulos</div></div>
  <div class="stat"><div class="stat-num" id="sMov">...</div><div class="stat-label">Peliculas</div></div>
  <div class="stat"><div class="stat-num" id="sSer">...</div><div class="stat-label">Series</div></div>
</div>
<div class="cats" id="cats">
  <div class="cat active" onclick="filterCat('all',this)">Todo</div>
  <div class="cat" onclick="filterCat('movie',this)">Peliculas</div>
  <div class="cat" onclick="filterCat('series',this)">Series</div>
  <div class="cat" onclick="filterCat('new',this)">Novedades</div>
</div>
<div id="heroSection"></div>
<div id="mainContent"></div>
<div id="searchContent" style="display:none"></div>
<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div id="modalContent"></div>
</div>
<script>
const TMDB_KEY = '0c471860943d4bcbac372c4f78a62e32';
const TMDB_IMG = 'https://image.tmdb.org/t/p/w500';
const TMDB_BACK = 'https://image.tmdb.org/t/p/w780';
const GROUP = 'https://t.me/+ohuk5C0d3Z1kZTZh';
const BOT = 'https://t.me/Peticiones4k_bot';
let catalog = {}, tmdbCache = {}, currentCat = 'all';

if(window.Telegram?.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}

async function loadCatalog(){
  try{
    const r = await fetch('catalog.json?v='+Date.now());
    catalog = await r.json();
    const vals = Object.values(catalog);
    document.getElementById('sTot').textContent = vals.length.toLocaleString();
    document.getElementById('sMov').textContent = vals.filter(v=>v.type!=='temporada').length.toLocaleString();
    document.getElementById('sSer').textContent = vals.filter(v=>v.type==='temporada').length.toLocaleString();
    renderHome();
  }catch(e){
    document.getElementById('mainContent').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error cargando catalogo</p></div>';
  }
}

async function getTMDB(title, isSeries){
  if(tmdbCache[title]) return tmdbCache[title];
  try{
    const type = isSeries ? 'tv' : 'movie';
    const r = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&language=es-ES`);
    const d = await r.json();
    const result = d.results?.[0] || null;
    tmdbCache[title] = result;
    return result;
  }catch{return null;}
}

function getPoster(tmdb, isSeries){
  const p = tmdb?.poster_path;
  return p ? TMDB_IMG+p : null;
}

function getBackdrop(tmdb){
  const b = tmdb?.backdrop_path;
  return b ? TMDB_BACK+b : null;
}

function getYear(tmdb, isSeries){
  const d = isSeries ? tmdb?.first_air_date : tmdb?.release_date;
  return d ? d.split('-')[0] : '';
}

function createCard(key, item, tmdb){
  const isSeries = item.type==='temporada';
  const poster = getPoster(tmdb, isSeries);
  const year = getYear(tmdb, isSeries);
  const parts = Object.keys(item.parts||{}).length;
  const badge = parts>0 ? `<div class="card-badge">${parts} ${isSeries?'T':'P'}</div>` : '';
  const img = poster
    ? `<img class="card-img" src="${poster}" alt="${item.title}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
    : '';
  const placeholder = `<div class="card-img-placeholder" style="${poster?'display:none':''}">${isSeries?'📺':'🎬'}</div>`;
  return `<div class="card" onclick="openModal('${key}')">
    ${img}${placeholder}${badge}
    <div class="card-info">
      <div class="card-title">${item.title}</div>
      <div class="card-meta">${isSeries?'Serie':'Pelicula'}${year?' · '+year:''}</div>
    </div>
  </div>`;
}

async function renderSection(title, items, containerId){
  const container = document.getElementById(containerId);
  if(!container) return;
  const cards = await Promise.all(items.slice(0,12).map(async([k,v])=>{
    const isSeries = v.type==='temporada';
    const tmdb = await getTMDB(v.title, isSeries);
    return createCard(k, v, tmdb);
  }));
  container.innerHTML = cards.join('');
}

async function renderHome(){
  const vals = Object.entries(catalog);
  const recent = [...vals].slice(-12).reverse();
  const movies = vals.filter(([k,v])=>v.type!=='temporada').slice(0,12);
  const series = vals.filter(([k,v])=>v.type==='temporada').slice(0,12);

  // Hero
  if(recent.length>0){
    const [hk, hv] = recent[0];
    const htmdb = await getTMDB(hv.title, hv.type==='temporada');
    const hback = getBackdrop(htmdb);
    const hyear = getYear(htmdb, hv.type==='temporada');
    document.getElementById('heroSection').innerHTML = `
      <div class="hero" onclick="openModal('${hk}')">
        ${hback?`<img class="hero-img" src="${hback}" alt="${hv.title}">`:'<div class="hero-img" style="background:linear-gradient(135deg,#1a1a2e,#16213e)"></div>'}
        <div class="hero-gradient"></div>
        <div class="hero-info">
          <div class="hero-title">${hv.title}</div>
          <div class="hero-sub">${hv.type==='temporada'?'Serie':'Pelicula'}${hyear?' · '+hyear:''} · Nuevo en el catalogo</div>
        </div>
      </div>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="section">
      <div class="sec-title">Novedades <span>Recientes</span></div>
      <div class="grid" id="gridNew"></div>
    </div>
    <div class="section">
      <div class="sec-title">Peliculas <span>Populares</span></div>
      <div class="grid" id="gridMovies"></div>
    </div>
    <div class="section">
      <div class="sec-title">Series <span>Populares</span></div>
      <div class="grid" id="gridSeries"></div>
    </div>`;

  await renderSection('Novedades', recent, 'gridNew');
  await renderSection('Peliculas', movies, 'gridMovies');
  await renderSection('Series', series, 'gridSeries');
}

let searchTimeout;
function handleSearch(q){
  clearTimeout(searchTimeout);
  if(!q.trim()){clearSearch();return;}
  searchTimeout = setTimeout(async()=>{
    document.getElementById('mainContent').style.display='none';
    document.getElementById('heroSection').style.display='none';
    document.getElementById('searchContent').style.display='block';
    const results = Object.entries(catalog).filter(([k,v])=>v.title.toLowerCase().includes(q.toLowerCase()));
    if(results.length===0){
      document.getElementById('searchContent').innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>No encontramos resultados</p><p style="margin-top:8px;font-size:12px;color:#555">Intenta con otro titulo</p></div>';
      return;
    }
    document.getElementById('searchContent').innerHTML=`<div class="section"><div class="sec-title">${results.length} <span>Resultados</span></div><div class="grid" id="gridSearch"></div></div>`;
    const cards = await Promise.all(results.slice(0,30).map(async([k,v])=>{
      const tmdb = await getTMDB(v.title, v.type==='temporada');
      return createCard(k,v,tmdb);
    }));
    document.getElementById('gridSearch').innerHTML=cards.join('');
  },400);
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchContent').style.display='none';
  document.getElementById('mainContent').style.display='block';
  document.getElementById('heroSection').style.display='block';
}

function filterCat(cat, el){
  document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  clearSearch();
  const vals = Object.entries(catalog);
  let filtered;
  if(cat==='all'){renderHome();return;}
  if(cat==='new') filtered=[...vals].slice(-30).reverse();
  else if(cat==='movie') filtered=vals.filter(([k,v])=>v.type!=='temporada');
  else filtered=vals.filter(([k,v])=>v.type==='temporada');
  document.getElementById('heroSection').innerHTML='';
  document.getElementById('mainContent').innerHTML=`<div class="section"><div class="sec-title">${cat==='movie'?'Peliculas':cat==='series'?'Series':'Novedades'} <span>Disponibles</span></div><div class="grid" id="gridFiltered"></div></div>`;
  Promise.all(filtered.slice(0,30).map(async([k,v])=>{
    const tmdb=await getTMDB(v.title,v.type==='temporada');
    return createCard(k,v,tmdb);
  })).then(cards=>{
    const g=document.getElementById('gridFiltered');
    if(g) g.innerHTML=cards.join('');
  });
}

async function openModal(key){
  const item = catalog[key];
  if(!item) return;
  const isSeries = item.type==='temporada';
  const tmdb = await getTMDB(item.title, isSeries);
  const poster = getPoster(tmdb, isSeries);
  const backdrop = getBackdrop(tmdb);
  const year = getYear(tmdb, isSeries);
  const overview = tmdb?.overview || 'Sin descripcion disponible.';
  const rating = tmdb?.vote_average ? tmdb.vote_average.toFixed(1) : '';
  const parts = Object.entries(item.parts||{}).sort((a,b)=>a[1].number-b[1].number);

  const backdropHtml = backdrop
    ? `<img class="modal-backdrop" src="${backdrop}" alt="${item.title}">`
    : `<div class="modal-backdrop-placeholder">${isSeries?'📺':'🎬'}</div>`;

  const partsHtml = parts.length>0 ? `
    <div class="parts-title">${isSeries?'Temporadas':'Partes'} Disponibles</div>
    <div class="parts-grid">
      ${parts.map(([pk,pv])=>`<button class="part-btn" onclick="goToGroup()">${pv.label}</button>`).join('')}
      <button class="part-btn" style="background:var(--red);border-color:var(--red)" onclick="goToGroup()">Ver todo</button>
    </div>` : '';

  document.getElementById('modalContent').innerHTML = `
    ${backdropHtml}
    <div class="modal-gradient"></div>
    <div class="modal-body">
      <div class="modal-title">${item.title}</div>
      <div class="modal-tags">
        <div class="tag red">${isSeries?'Serie':'Pelicula'}</div>
        ${year?`<div class="tag">${year}</div>`:''}
        ${rating?`<div class="tag">⭐ ${rating}</div>`:''}
        ${parts.length>0?`<div class="tag">${parts.length} ${isSeries?'temporada(s)':'parte(s)'}</div>`:''}
      </div>
      <div class="modal-overview">${overview}</div>
      ${partsHtml}
      <button class="btn-primary" onclick="goToGroup()">🎬 Ver en el grupo</button>
      <button class="btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;

  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').scrollTop=0;
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

function goToGroup(){
  if(window.Telegram?.WebApp) window.Telegram.WebApp.openLink(GROUP);
  else window.open(GROUP,'_blank');
}

loadCatalog();
</script>
</body>
</html>
