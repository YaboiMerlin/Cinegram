<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cinegram 4K</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--red:#e50914;--dark:#0a0a0a;--card:#141414;--card2:#1c1c1c;--text:#fff;--muted:#777;--border:#222;}
body{background:var(--dark);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
.header{background:rgba(0,0,0,.92);padding:12px 14px;position:sticky;top:0;z-index:100;border-bottom:1px solid #111;backdrop-filter:blur(20px);}
.logo{font-size:19px;font-weight:900;color:var(--red);letter-spacing:2px;margin-bottom:10px;}
.logo span{color:#fff;}.logo small{font-size:9px;color:var(--muted);letter-spacing:2px;font-weight:400;display:block;}
.search-row{display:flex;gap:8px;}
.search-row input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;color:#fff;font-size:14px;outline:none;transition:border .2s;}
.search-row input:focus{border-color:var(--red);}
.search-row button{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--muted);font-size:14px;cursor:pointer;}
.stats{display:flex;background:#0d0d0d;border-bottom:1px solid #111;}
.stat{flex:1;text-align:center;padding:9px 0;border-right:1px solid #111;}
.stat:last-child{border-right:none;}
.stat-num{font-size:14px;font-weight:800;color:var(--red);}
.stat-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.nav{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;scrollbar-width:none;border-bottom:1px solid #111;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px;color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;}
.nav-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.genres-row{display:flex;gap:6px;overflow-x:auto;padding:8px 14px;scrollbar-width:none;background:#0d0d0d;border-bottom:1px solid #111;}
.genres-row::-webkit-scrollbar{display:none;}
.genre-tag{background:transparent;border:1px solid #2a2a2a;border-radius:16px;padding:5px 12px;color:#888;font-size:11px;white-space:nowrap;cursor:pointer;transition:all .2s;}
.genre-tag.active{background:#2a2a2a;border-color:#444;color:#fff;}
.carousel-wrap{position:relative;height:210px;overflow:hidden;background:#111;}
.carousel-track{display:flex;height:100%;transition:transform .6s cubic-bezier(.25,.46,.45,.94);}
.c-slide{min-width:100%;height:100%;position:relative;cursor:pointer;}
.c-slide img{width:100%;height:100%;object-fit:cover;}
.c-slide-ph{width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:60px;}
.c-grad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,10,10,1) 0%,rgba(0,0,0,.4) 55%,transparent 100%);}
.c-info{position:absolute;bottom:14px;left:14px;right:50px;}
.c-title{font-size:18px;font-weight:800;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.9);}
.c-sub{font-size:11px;color:#bbb;margin-top:3px;}
.c-rating{display:inline-block;background:rgba(229,9,20,.8);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-top:4px;}
.c-dots{position:absolute;bottom:10px;right:14px;display:flex;gap:4px;}
.c-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s;}
.c-dot.active{width:14px;border-radius:3px;background:var(--red);}
.section{padding:14px 14px 0;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:14px;font-weight:700;}
.sec-title .acc{color:var(--red);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.card{background:var(--card);border-radius:9px;overflow:hidden;cursor:pointer;position:relative;transition:opacity .15s;}
.card:active{opacity:.7;}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.card-ph{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:28px;}
.card-info{padding:6px 7px 8px;}
.card-title{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.card-meta{font-size:9px;color:var(--red);margin-top:2px;}
.badge{position:absolute;top:4px;right:4px;background:rgba(229,9,20,.85);color:#fff;font-size:7px;font-weight:700;padding:2px 5px;border-radius:4px;}
.modal{display:none;position:fixed;inset:0;background:#000;z-index:200;overflow-y:auto;overscroll-behavior:contain;}
.modal.open{display:block;}
.m-hero{position:relative;height:200px;}
.m-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.m-hero-ph{height:200px;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;font-size:70px;}
.m-grad{position:absolute;inset:0;background:linear-gradient(0deg,#000 0%,transparent 60%);}
.m-close{position:fixed;top:12px;right:12px;background:rgba(0,0,0,.75);border:1px solid #333;border-radius:50%;width:33px;height:33px;color:#fff;font-size:15px;cursor:pointer;z-index:201;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.m-body{padding:12px 14px 32px;}
.m-title{font-size:21px;font-weight:900;line-height:1.2;}
.m-tagline{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic;}
.m-tags{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;}
.tag{background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:10px;color:#ccc;}
.tag.red{background:rgba(229,9,20,.12);border-color:rgba(229,9,20,.35);color:var(--red);}
.tag.gold{background:rgba(255,193,7,.08);border-color:rgba(255,193,7,.25);color:#ffc107;}
.m-overview{font-size:12.5px;color:#999;line-height:1.7;margin:10px 0 14px;}
.m-divider{height:1px;background:var(--border);margin:14px 0;}
.m-sec-title{font-size:13px;font-weight:700;margin-bottom:10px;}
.seasons-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.s-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;min-width:80px;text-align:center;}
.s-btn:active{background:var(--red);border-color:var(--red);}
.s-btn small{display:block;font-size:9px;color:var(--muted);margin-top:2px;font-weight:400;}
.btn-p{width:100%;background:var(--red);border:none;border-radius:11px;padding:14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s;}
.btn-p:active{opacity:.8;}
.btn-s{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:11px;padding:12px;color:#fff;font-size:13px;cursor:pointer;margin-top:7px;}
.spin-wrap{text-align:center;padding:50px 20px;color:var(--muted);}
.spinner{width:28px;height:28px;border:2.5px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">CINE<span>GRAM</span><small>4K · CATALOGO OFICIAL</small></div>
  <div class="search-row">
    <input type="text" id="si" placeholder="Buscar peliculas y series..." oninput="doSearch(this.value)">
    <button onclick="clearSearch()">✕</button>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-num" id="sT">-</div><div class="stat-label">Titulos</div></div>
  <div class="stat"><div class="stat-num" id="sM">-</div><div class="stat-label">Peliculas</div></div>
  <div class="stat"><div class="stat-num" id="sS">-</div><div class="stat-label">Series</div></div>
</div>
<div class="nav" id="nav">
  <div class="nav-btn active" onclick="setNav('all',this)">Todo</div>
  <div class="nav-btn" onclick="setNav('movie',this)">Peliculas</div>
  <div class="nav-btn" onclick="setNav('series',this)">Series</div>
  <div class="nav-btn" onclick="setNav('new',this)">Recientes</div>
</div>
<div class="genres-row" id="genreRow"></div>
<div id="carousel"></div>
<div id="main"><div class="spin-wrap"><div class="spinner"></div><p>Cargando...</p></div></div>
<div id="searchDiv" style="display:none"></div>
<div class="modal" id="modal">
  <button class="m-close" onclick="closeModal()">✕</button>
  <div id="mc"></div>
</div>
<script>
const KEY='0c471860943d4bcbac372c4f78a62e32';
const IMG='https://image.tmdb.org/t/p/w500';
const BACK='https://image.tmdb.org/t/p/w780';
const GRP='https://t.me/+ohuk5C0d3Z1kZTZh';
const GID='2503161055';
const GENRES={28:'Accion',12:'Aventura',16:'Animacion',35:'Comedia',80:'Crimen',18:'Drama',14:'Fantasia',27:'Terror',10749:'Romance',878:'Sci-Fi',53:'Suspenso',10751:'Familia',99:'Documental'};
const CUR_YEAR=new Date().getFullYear();

let cat={},tc={},ci=0,ct=null,cSlides=[];
let popularCache={movies:[],series:[]};

if(window.Telegram?.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}

async function init(){
  try{
    const r=await fetch('catalog.json?v='+Date.now());
    cat=await r.json();
    const v=Object.values(cat);
    document.getElementById('sT').textContent=v.length.toLocaleString();
    document.getElementById('sM').textContent=v.filter(x=>x.type!=='temporada').length.toLocaleString();
    document.getElementById('sS').textContent=v.filter(x=>x.type==='temporada').length.toLocaleString();
    buildGenres();
    await renderHome();
  }catch(e){
    document.getElementById('main').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Error cargando</p></div>';
  }
}

function buildGenres(){
  document.getElementById('genreRow').innerHTML=Object.entries(GENRES).map(([id,n])=>
    `<div class="genre-tag" onclick="byGenre(${id},'${n}',this)">${n}</div>`).join('');
}

async function tmdb(title,tv){
  const k=title+(tv?'_tv':'_mv');
  if(tc[k]!==undefined) return tc[k];
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/${tv?'tv':'movie'}?api_key=${KEY}&query=${encodeURIComponent(title)}&language=es-ES`);
    const d=await r.json();
    tc[k]=d.results?.[0]||null;
  }catch{tc[k]=null;}
  return tc[k];
}

async function tmdbDetail(id,tv){
  try{
    const r=await fetch(`https://api.themoviedb.org/3/${tv?'tv':'movie'}/${id}?api_key=${KEY}&language=es-ES`);
    return await r.json();
  }catch{return null;}
}

// Get popular titles from TMDB that exist in our catalog
async function getPopularFromCatalog(tv, max=12){
  const type=tv?'tv':'movie';
  const scored=[];
  const entries=Object.entries(cat).filter(([k,v])=>tv?(v.type==='temporada'):(v.type!=='temporada'));

  // Fetch TMDB data for a sample and sort by popularity
  const sample=entries.slice(0, Math.min(150, entries.length));
  await Promise.all(sample.map(async([k,v])=>{
    const td=await tmdb(v.title,tv);
    if(td){
      const yr=parseInt(tv?td.first_air_date?.split('-')[0]:td.release_date?.split('-')[0])||0;
      const pop=td.vote_average||0;
      const votes=td.vote_count||0;
      // Score: popularity + recency bonus
      const recencyBonus=yr>=CUR_YEAR-2?2:yr>=CUR_YEAR-5?1:0;
      const score=pop*Math.log(votes+1)+recencyBonus*3;
      scored.push({key:k,item:v,td,score,yr});
    }
  }));

  return scored.sort((a,b)=>b.score-a.score).slice(0,max);
}

function card(key,item,td){
  const tv=item.type==='temporada';
  const p=td?.poster_path?IMG+td.poster_path:null;
  const yr=tv?td?.first_air_date?.split('-')[0]:td?.release_date?.split('-')[0];
  const cnt=Object.keys(item.parts||{}).length;
  return `<div class="card" onclick="openModal('${key}')">
    ${p?`<img class="card-img" src="${p}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`:'' }
    <div class="card-ph" style="${p?'display:none':''}">${tv?'📺':'🎬'}</div>
    ${cnt>0?`<div class="badge">${cnt}${tv?'T':'P'}</div>`:''}
    <div class="card-info">
      <div class="card-title">${item.title}</div>
      <div class="card-meta">${tv?'Serie':'Pelicula'}${yr?'·'+yr:''}</div>
    </div>
  </div>`;
}

async function grid(items,max=12){
  const cards=await Promise.all(items.slice(0,max).map(async([k,v])=>card(k,v,await tmdb(v.title,v.type==='temporada'))));
  return `<div class="grid">${cards.join('')}</div>`;
}

async function gridFromScored(scored){
  return `<div class="grid">${scored.map(s=>card(s.key,s.item,s.td)).join('')}</div>`;
}

async function startCarousel(scored){
  cSlides=[];
  clearInterval(ct);
  for(const s of scored.slice(0,8)){
    const back=s.td?.backdrop_path?BACK+s.td.backdrop_path:null;
    cSlides.push({key:s.key,item:s.item,back,yr:s.yr,rating:s.td?.vote_average?.toFixed(1)||''});
  }
  ci=0;
  const slides=cSlides.map((s,i)=>`
    <div class="c-slide" onclick="openModal('${s.key}')">
      ${s.back?`<img src="${s.back}" alt="${s.item.title}">`:`<div class="c-slide-ph">${s.item.type==='temporada'?'📺':'🎬'}</div>`}
      <div class="c-grad"></div>
      <div class="c-info">
        <div class="c-title">${s.item.title}</div>
        <div class="c-sub">${s.item.type==='temporada'?'Serie':'Pelicula'}${s.yr?' · '+s.yr:''}</div>
        ${s.rating?`<div class="c-rating">⭐ ${s.rating}</div>`:''}
      </div>
    </div>`).join('');
  const dots=cSlides.map((_,i)=>`<div class="c-dot${i===0?' active':''}" id="cd${i}"></div>`).join('');
  document.getElementById('carousel').innerHTML=`<div class="carousel-wrap"><div class="carousel-track" id="ctrack">${slides}</div><div class="c-dots">${dots}</div></div>`;
  ct=setInterval(()=>{ci=(ci+1)%cSlides.length;moveCar();},4500);
}

function moveCar(){
  const t=document.getElementById('ctrack');
  if(t) t.style.transform=`translateX(-${ci*100}%)`;
  cSlides.forEach((_,i)=>{const d=document.getElementById('cd'+i);if(d)d.className='c-dot'+(i===ci?' active':'');});
}

async function renderHome(){
  document.getElementById('main').innerHTML='<div class="spin-wrap"><div class="spinner"></div><p>Cargando populares...</p></div>';

  // Get popular movies and series
  const [popMovies, popSeries] = await Promise.all([
    getPopularFromCatalog(false, 12),
    getPopularFromCatalog(true, 12)
  ]);

  // Mix for carousel - top from both
  const mixed=[...popMovies.slice(0,4),...popSeries.slice(0,4)].sort((a,b)=>b.score-a.score);
  startCarousel(mixed);

  // Recent additions (last 12 added)
  const recent=[...Object.entries(cat)].slice(-12).reverse();

  document.getElementById('main').innerHTML=`
    <div class="section"><div class="sec-head"><div class="sec-title">Agregado <span class="acc">Recientemente</span></div></div><div id="gR"></div></div>
    <div class="section"><div class="sec-head"><div class="sec-title">Peliculas <span class="acc">Populares</span></div></div><div id="gM"></div></div>
    <div class="section"><div class="sec-head"><div class="sec-title">Series <span class="acc">Populares</span></div></div><div id="gS"></div></div>`;

  document.getElementById('gR').innerHTML=await grid(recent);
  document.getElementById('gM').innerHTML=await gridFromScored(popMovies);
  document.getElementById('gS').innerHTML=await gridFromScored(popSeries);
}

let st;
function doSearch(q){
  clearTimeout(st);
  if(!q.trim()){clearSearch();return;}
  st=setTimeout(async()=>{
    clearInterval(ct);
    document.getElementById('carousel').style.display='none';
    document.getElementById('main').style.display='none';
    document.getElementById('searchDiv').style.display='block';
    const res=Object.entries(cat).filter(([k,v])=>v.title.toLowerCase().includes(q.toLowerCase()));
    if(!res.length){document.getElementById('searchDiv').innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Sin resultados para "'+q+'"</p></div>';return;}
    document.getElementById('searchDiv').innerHTML=`<div class="section"><div class="sec-head"><div class="sec-title">${res.length} <span class="acc">Resultados</span></div></div><div id="gSr"></div></div>`;
    document.getElementById('gSr').innerHTML=await grid(res,30);
  },350);
}

function clearSearch(){
  document.getElementById('si').value='';
  document.getElementById('searchDiv').style.display='none';
  document.getElementById('main').style.display='block';
  document.getElementById('carousel').style.display='block';
}

function setNav(type,el){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.genre-tag').forEach(g=>g.classList.remove('active'));
  clearSearch();
  if(type==='all'){renderHome();return;}
  clearInterval(ct);
  document.getElementById('carousel').innerHTML='';
  const v=Object.entries(cat);
  let f=type==='new'?[...v].slice(-40).reverse():type==='movie'?v.filter(([k,x])=>x.type!=='temporada'):v.filter(([k,x])=>x.type==='temporada');
  document.getElementById('main').innerHTML='<div class="spin-wrap"><div class="spinner"></div></div>';
  grid(f,30).then(h=>{
    document.getElementById('main').innerHTML=`<div class="section"><div class="sec-head"><div class="sec-title">${type==='movie'?'Peliculas':type==='series'?'Series':'Recientes'} <span class="acc">Disponibles</span></div></div>${h}</div>`;
  });
}

async function byGenre(gid,gname,el){
  document.querySelectorAll('.genre-tag').forEach(g=>g.classList.remove('active'));
  el.classList.add('active');
  clearSearch();
  clearInterval(ct);
  document.getElementById('carousel').innerHTML='';
  document.getElementById('main').innerHTML=`<div class="spin-wrap"><div class="spinner"></div><p>Cargando ${gname}...</p></div>`;
  const v=Object.entries(cat);
  const found=[];
  for(const[k,x] of v){
    if(found.length>=30) break;
    const td=await tmdb(x.title,x.type==='temporada');
    if(td?.genre_ids?.includes(gid)) found.push([k,x]);
  }
  if(!found.length){document.getElementById('main').innerHTML=`<div class="empty"><div class="empty-icon">🎭</div><p>Sin resultados para ${gname}</p></div>`;return;}
  document.getElementById('main').innerHTML=`<div class="section"><div class="sec-head"><div class="sec-title">${gname} <span class="acc">Disponible</span></div></div>${await grid(found,30)}</div>`;
}

async function openModal(key){
  const item=cat[key];
  if(!item) return;
  const tv=item.type==='temporada';
  const td=await tmdb(item.title,tv);
  const det=td?.id?await tmdbDetail(td.id,tv):null;
  const back=td?.backdrop_path?BACK+td.backdrop_path:null;
  const yr=tv?td?.first_air_date?.split('-')[0]:td?.release_date?.split('-')[0];
  const ov=det?.overview||td?.overview||'Sin descripcion disponible.';
  const rat=td?.vote_average?td.vote_average.toFixed(1):'';
  const tgl=det?.tagline||'';
  const parts=Object.entries(item.parts||{}).sort((a,b)=>a[1].number-b[1].number);
  const gnrs=det?.genres?.slice(0,3).map(g=>`<div class="tag">${g.name}</div>`).join('')||'';

  let actHtml='';
  if(parts.length>0){
    const sBtns=parts.map(([pk,pv])=>`<div class="s-btn" onclick="go(${pv.msg_id})">${pv.label}<small>Ver →</small></div>`).join('');
    actHtml=`<div class="m-divider"></div>
      <div class="m-sec-title">${tv?'Temporadas':'Partes'} Disponibles</div>
      <div class="seasons-wrap">${sBtns}</div>
      <button class="btn-p" onclick="go(${parts[0][1].msg_id})">▶ Ver ${tv?'Temporada 1':'Parte 1'}</button>
      <button class="btn-s" onclick="go(0)">Ver todo en el grupo</button>`;
  } else {
    const mid=item.msg_ids?.[0]||0;
    actHtml=`<div class="m-divider"></div>
      <button class="btn-p" onclick="go(${mid})">▶ Ver en el grupo</button>
      <button class="btn-s" onclick="go(0)">Ir al grupo</button>`;
  }

  document.getElementById('mc').innerHTML=`
    <div class="m-hero">
      ${back?`<img src="${back}">`:`<div class="m-hero-ph">${tv?'📺':'🎬'}</div>`}
      <div class="m-grad"></div>
    </div>
    <div class="m-body">
      <div class="m-title">${item.title}</div>
      ${tgl?`<div class="m-tagline">"${tgl}"</div>`:''}
      <div class="m-tags">
        <div class="tag red">${tv?'Serie':'Pelicula'}</div>
        ${yr?`<div class="tag">${yr}</div>`:''}
        ${rat?`<div class="tag gold">⭐ ${rat}</div>`:''}
        ${gnrs}
        ${parts.length>0?`<div class="tag">${parts.length} ${tv?'temp.':'partes'}</div>`:''}
      </div>
      <div class="m-overview">${ov}</div>
      ${actHtml}
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').scrollTop=0;
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function go(mid){
  const url=mid?`https://t.me/c/${GID}/${mid}`:GRP;
  if(window.Telegram?.WebApp) window.Telegram.WebApp.openLink(url);
  else window.open(url,'_blank');
}

init();
</script>
